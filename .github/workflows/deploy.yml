name: CI and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.4'
  ENABLE_AZURE_DEPLOY: ${{ vars.ENABLE_AZURE_DEPLOY || 'false' }}

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist
          retention-days: 7

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-gateway-dist
          path: services/api-gateway/dist
          retention-days: 7

      - name: Upload AI service artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-service-dist
          path: services/ai-service/dist
          retention-days: 7

  deploy-web:
    name: Deploy Web to Azure Static Web Apps
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.ENABLE_AZURE_DEPLOY == 'true'

    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: apps/web/dist
          output_location: .
          skip_deployment_on_missing_secrets: true

  deploy-api:
    name: Deploy API Gateway to Azure App Service
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.ENABLE_AZURE_DEPLOY == 'true'
    environment:
      name: Production
      url: ${{ steps.deploy-api.outputs.webapp-url }}

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-gateway-dist
          path: services/api-gateway/dist

      - name: Deploy API Gateway
        id: deploy-api
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: services/api-gateway/dist

  deploy-ai-service:
    name: Deploy AI Service to Azure App Service
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.ENABLE_AZURE_DEPLOY == 'true'

    steps:
      - name: Download AI service artifact
        uses: actions/download-artifact@v4
        with:
          name: ai-service-dist
          path: services/ai-service/dist

      - name: Deploy AI Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_AI_SERVICE_NAME }}
          publish-profile: ${{ secrets.AZURE_AI_SERVICE_PUBLISH_PROFILE }}
          package: services/ai-service/dist
